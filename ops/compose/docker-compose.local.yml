services:
  postgres:
    image: postgres:16
    container_name: birds-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: labelstudio
      POSTGRES_USER: labelstudio
      POSTGRES_PASSWORD: labelstudio
    volumes:
      - ${LABEL_STUDIO_PGDATA_DIR}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labelstudio -d labelstudio"]
      interval: 10s
      timeout: 5s
      retries: 5

  label-studio:
    image: heartexlabs/label-studio:1.22.0
    container_name: birds-local-label-studio
    restart: unless-stopped
    ports:
      - "${LABEL_STUDIO_PORT:-8080}:8080"
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: labelstudio
      POSTGRE_PASSWORD: labelstudio
      POSTGRE_PORT: 5432
      POSTGRE_HOST: postgres
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /data
      LABEL_STUDIO_HOST: ${LABEL_STUDIO_EXTERNAL_URL:-http://localhost:8080}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME:-admin@local}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD:-change_me}
      fflag_all_feat_utc_204_users_performance_improvements_in_dm_for_large_orgs: "false"
      fflag_feat_front_leap_1424_grid_preview_short: "false"
      fflag_dev_disable_polling_killswitch_short: "true"
    depends_on:
      postgres:
        condition: service_healthy
      ml-backend:
        condition: service_started
    volumes:
      - ${BIRDS_DATA_ROOT}:/data/birds_project
      - ${LABEL_STUDIO_APP_DATA_DIR}:/label-studio/data
      - ../../projects/labelstudio/deploy/overrides/localfiles_views.py:/label-studio/label_studio/io_storages/localfiles/views.py:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ml-backend:
    build:
      context: ../..
      dockerfile: projects/ml_backend/Dockerfile
    container_name: birds-local-ml-backend
    restart: unless-stopped
    environment:
      BIRDS_DATA_ROOT: /data/birds_project
      MODEL_A_WEIGHTS: /models/model_a/weights.pt
      MODEL_A_DEVICE: ${MODEL_A_DEVICE:-cpu}
      MODEL_A_IMGSZ: ${MODEL_A_IMGSZ:-1280}
      MODEL_A_MAX_DET: ${MODEL_A_MAX_DET:-300}
      MODEL_A_CONF: ${MODEL_A_CONF:-0.25}
      MODEL_A_IOU: ${MODEL_A_IOU:-0.45}
      MODEL_B_CHECKPOINT: ${MODEL_B_CHECKPOINT:-}
      BIRDS_LOG_LEVEL: ${BIRDS_LOG_LEVEL:-INFO}
    ports:
      - "${ML_BACKEND_PORT:-9090}:9090"
    volumes:
      - ${BIRDS_DATA_ROOT}:/data/birds_project
      - ${MODEL_A_SERVING_WEIGHTS}:/models/model_a/weights.pt:ro
